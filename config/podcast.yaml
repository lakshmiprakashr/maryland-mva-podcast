# Maryland MVA Podcast Configuration

podcast:
  title: "Maryland MVA Study Podcast"
  description: "Audio review for Maryland Driver's License Exam"
  author: "Maryland MVA Study Guide"
  language: "en-us"
  link: "https://github.com/user/maryland-mva-podcast"

voices:
  default: "en-US-GuyNeural"
  alternative: "en-US-AriaNeural"
  authoritative: "en-US-ChristopherNeural"
  
  settings:
    rate: "-5%"
    pitch: "+0Hz"
    volume: "+0%"

tts:
  provider: "edge-tts"  # edge-tts | piper
  format: "mp3"
  quality: "256k"
  
  piper:
    model: "en_US-lessac-medium"
    sentence_silence: 0.5

pause_markers:
  "[PAUSE]": 800        # milliseconds
  "[LONG PAUSE]": 1500
  "[EMPHASIS]": 200

abbreviations:
  "MVA": "M-V-A"
  "GDL": "G-D-L"
  "BAC": "B-A-C"
  "CDL": "C-D-L"
  "ABS": "A-B-S"
  "SSN": "S-S-N"
  "MVC": "M-V-C"

chapters:
  driver_manual:
    - id: "01"
      title: "Driving Tests Requirements"
