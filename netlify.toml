[build]
  publish = "docs"
  command = "echo 'Static site - no build needed'"

[[headers]]
  for = "/audio/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

[[redirects]]
  from = "/rss"
  to = "/feed.xml"
  status = 301

[[redirects]]
  from = "/podcast"
  to = "/feed.xml"
  status = 301
