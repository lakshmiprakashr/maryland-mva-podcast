[build]
  publish = "podcast"
  command = "echo 'Static site - no build needed'"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=31536000"

[[redirects]]
  from = "/rss"
  to = "/podcast.xml"
  status = 301

[[redirects]]
  from = "/feed"
  to = "/podcast.xml"
  status = 301
